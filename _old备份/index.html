<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孙宇飞 · 个人主页</title>
  <!-- 网页长相在这个文件里:css/style.css -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 这是网页骨架,你基本不用动。
       页面上的文字都来自 js/content.js,会自动填到下面带 id 的位置。 -->

  <div class="hero">
    <h1 id="js-name"></h1>
    <p id="js-tagline"></p>
  </div>

  <div class="container">
    <section>
      <h2>关于我</h2>
      <div class="card">
        <p id="js-about"></p>
      </div>
    </section>

    <section>
      <h2>我的作品 / 经历</h2>
      <!-- 作品卡片由 content.js 自动生成,放进这里 -->
      <div id="js-works"></div>
    </section>

    <section>
      <h2>联系我</h2>
      <div class="card" id="js-contact"></div>
    </section>
  </div>

  <footer id="js-footer"></footer>

  <!-- 内容文件要先加载,再加载显示逻辑,顺序不能反 -->
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
